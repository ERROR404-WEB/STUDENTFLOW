<div class="admin-container">

    <div class="page-header">

        <div>

            <h1>User Management</h1>

            <p>
                Create and manage platform users.
            </p>

        </div>

        <button pButton icon="pi pi-plus" label="Add User" (click)="openCreateUser()">
        </button>

    </div>

    <!-- Search -->

    <div class="search-card">

        <input pInputText type="text" placeholder="Search users..." [(ngModel)]="searchText">

    </div>

    <!-- Table -->

    <div class="table-card">

        <p-table [value]="filteredUsers" responsiveLayout="scroll">

            <ng-template pTemplate="header">

                <tr>

                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>

                </tr>

            </ng-template>

            <ng-template pTemplate="body" let-user>

                <tr>

                    <td>{{ user.name }}</td>

                    <td>{{ user.email }}</td>

                    <td>

                        <span class="role-badge">

                            {{ user.role }}

                        </span>

                    </td>

                    <td>

                        <span class="status-badge" [class.active]="user.isActive" [class.inactive]="!user.isActive">

                            {{ user.isActive ? 'ACTIVE' : 'DISABLED' }}

                        </span>

                    </td>

                    <td>

                        <button pButton text icon="pi pi-pencil">
                        </button>

                        <button pButton text [icon]="user.isActive ? 'pi pi-ban' : 'pi pi-check'"
                            (click)="toggleUser(user)">
                        </button>

                    </td>

                </tr>

            </ng-template>

        </p-table>

    </div>

    <!-- Create User Dialog -->

    <p-dialog header="Create User" [(visible)]="showUserDialog" [style]="{ width: '500px' }">

        <div class="form-field">

            <label>Name</label>

            <input pInputText [(ngModel)]="newUser.name">

        </div>

        <div class="form-field">

            <label>Email</label>

            <input pInputText [(ngModel)]="newUser.email">

        </div>

        <div class="form-field">

            <label>Password</label>

            <input pInputText type="password" [(ngModel)]="newUser.password">

        </div>

        <div class="form-field">

            <label>Role</label>

            <p-select [options]="roles" optionLabel="label" optionValue="value" [(ngModel)]="newUser.role"
                appendTo="body">
            </p-select>

        </div>

        <div class="dialog-actions">

            <button pButton label="Create User" icon="pi pi-check" (click)="createUser()">
            </button>

        </div>

    </p-dialog>

</div>
